spring.application.name=trivia
spring.datasource.url=jdbc:postgresql://localhost:5433/TriviaGame
spring.datasource.username=postgres
# Criar variável de ambiente (${DB_PASSWORD}) e guardar a senha do banco de dados lá, para não expor a senha no código-fonte!
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update  
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl