<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Admin - Corridas</title>
</head>
<body class="bg-gray-50">

    <div class="max-w-7xl mx-auto px-4 py-6">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Gerenciar Corridas</h1>
            <div class="flex gap-3">
                <a href="/admin/corridas/nova" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition">+ Nova Corrida</a>
                <a href="/lobby" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-4 py-2 rounded-lg text-sm font-medium transition">Voltar ao Lobby</a>
            </div>
        </div>

        <div th:if="${mensagem}" class="mb-4 p-3 bg-green-100 border border-green-300 text-green-700 rounded-lg" th:text="${mensagem}"></div>

        <div class="bg-white shadow-md rounded-lg overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-100">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Título</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Descrição</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Tempo (s)</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Ativo</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Ações</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                    <tr th:each="c : ${corridas}">
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${c.id}">1</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-gray-800" th:text="${c.titulo}">Título</td>
                        <td class="px-6 py-4 text-sm text-gray-500" th:text="${c.descricao}">Descrição</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${c.tempo}">60</td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span th:if="${c.ativo}" class="bg-green-100 text-green-800 px-2 py-1 rounded-full text-xs">Sim</span>
                            <span th:unless="${c.ativo}" class="bg-red-100 text-red-800 px-2 py-1 rounded-full text-xs">Não</span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm space-x-2">
                            <a th:href="@{/admin/corridas/editar/{id}(id=${c.id})}" class="text-indigo-600 hover:text-indigo-900">Editar</a>
                            <a th:href="@{/admin/perguntas/{id}(id=${c.id})}" class="text-blue-600 hover:text-blue-900">Perguntas</a>
                            <a th:href="@{/admin/corridas/excluir/{id}(id=${c.id})}" onclick="return confirm('Excluir esta corrida?')" class="text-red-600 hover:text-red-900">Excluir</a>
                        </td>
                    </tr>
                    <tr th:if="${corridas.empty}">
                        <td colspan="6" class="px-6 py-8 text-center text-gray-400">Nenhuma corrida cadastrada.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
