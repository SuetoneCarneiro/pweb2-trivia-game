<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Participantes - [[${corrida.titulo}]]</title>
</head>
<body class="bg-gray-50">

    <header class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
            <h1 class="text-2xl font-bold text-indigo-700">Trivia Game</h1>
            <a href="/admin/dashboard" class="text-sm font-medium text-gray-600 hover:text-indigo-600 transition">← Dashboard</a>
        </div>
    </header>

    <div class="max-w-6xl mx-auto px-4 py-6">
        <h2 class="text-2xl font-bold text-gray-800 mb-2">Participantes da corrida: <span th:text="${corrida.titulo}" class="text-indigo-600"></span></h2>
        <p class="text-gray-500 mb-6">Lista de participantes que já começaram esta corrida e suas pontuações.</p>

        <div class="bg-white shadow rounded-lg overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-100">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Participante</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Pontuação</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Data</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${participantes}">
                        <td class="px-6 py-4 text-sm text-gray-800" th:text="${r.idParticipante.nome}">Nome</td>
                        <td class="px-6 py-4 text-sm font-semibold text-indigo-600" th:text="${r.pontuacao}">0</td>
                        <td class="px-6 py-4 text-sm text-gray-400" th:text="${#temporals.format(r.dataHora, 'dd/MM/yyyy HH:mm')}">Data</td>
                    </tr>
                    <tr th:if="${participantes.empty}">
                        <td colspan="3" class="px-6 py-8 text-center text-gray-400">Nenhum participante registrado para esta corrida ainda.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
