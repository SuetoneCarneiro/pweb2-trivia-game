<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Admin Dashboard - Trivia Game</title>
</head>
<body class="bg-gray-50">

    <header class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <h1 class="text-2xl font-bold text-indigo-700">Trivia Game</h1>
            <div class="flex items-center gap-4">
                <a href="/admin/dashboard" class="text-sm font-medium text-gray-600 hover:text-indigo-600 transition">Dashboard</a>
                <a href="/logout" class="text-sm font-medium text-red-500 hover:text-red-700 transition">Sair</a>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-gray-800">Gerenciar Corridas</h2>
            <a href="/admin/corridas/nova" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium">+ Nova Corrida</a>
        </div>

        <div th:if="${mensagem}" class="mb-4 p-3 bg-green-100 border border-green-300 text-green-700 rounded-lg" th:text="${mensagem}"></div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div th:each="c : ${corridas}" class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden">
                <div class="p-5">
                    <div class="flex justify-between items-start">
                        <h3 class="text-xl font-bold text-gray-800" th:text="${c.titulo}">Título</h3>
                        <span th:if="${c.ativo}" class="bg-green-100 text-green-800 text-xs px-2 py-1 rounded-full">Ativa</span>
                        <span th:unless="${c.ativo}" class="bg-red-100 text-red-800 text-xs px-2 py-1 rounded-full">Inativa</span>
                    </div>
                    <p class="text-gray-500 text-sm mt-2" th:text="${c.descricao}">Descrição</p>
                    <div class="mt-3 text-xs text-gray-400">
                        <span>Tempo: <span th:text="${c.tempo} + 's'"></span></span>
                        <span class="ml-3">Perguntas: <span th:text="${c.perguntas.size()}"></span></span>
                    </div>
                    <div class="mt-4 flex flex-wrap gap-2">
                        <a th:href="@{/admin/perguntas/{id}(id=${c.id})}" class="text-sm bg-indigo-50 text-indigo-600 px-3 py-1 rounded-lg hover:bg-indigo-100">Perguntas</a>
                        <a th:href="@{/admin/corridas/editar/{id}(id=${c.id})}" class="text-sm bg-amber-50 text-amber-600 px-3 py-1 rounded-lg hover:bg-amber-100">Editar</a>
                        <a th:href="@{/admin/participantes/{id}(id=${c.id})}" class="text-sm bg-emerald-50 text-emerald-600 px-3 py-1 rounded-lg hover:bg-emerald-100">Participantes</a>
                        <a th:href="@{/admin/corridas/excluir/{id}(id=${c.id})}" onclick="return confirm('Excluir esta corrida?')" class="text-sm bg-red-50 text-red-600 px-3 py-1 rounded-lg hover:bg-red-100">Excluir</a>
                    </div>
                </div>
            </div>
        </div>
        <div th:if="${corridas.empty}" class="text-center py-20 text-gray-400">
            Nenhuma corrida cadastrada. Clique em "+ Nova Corrida" para criar.
        </div>
    </main>

</body>
</html>
