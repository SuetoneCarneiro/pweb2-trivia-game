<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Perguntas - [[${corrida.titulo}]]</title>
</head>
<body class="bg-gray-50">

    <header class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
            <h1 class="text-2xl font-bold text-indigo-700">Trivia Game</h1>
            <a href="/admin/dashboard" class="text-sm font-medium text-gray-600 hover:text-indigo-600 transition">← Dashboard</a>
        </div>
    </header>

    <div class="max-w-6xl mx-auto px-4 py-6">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-2xl font-bold text-gray-800">Perguntas da corrida: <span th:text="${corrida.titulo}" class="text-indigo-600"></span></h2>
            <a th:href="@{/admin/perguntas/nova/{id}(id=${corrida.id})}" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium">+ Nova Pergunta</a>
        </div>

        <div th:if="${mensagem}" class="mb-4 p-3 bg-green-100 border border-green-300 text-green-700 rounded-lg" th:text="${mensagem}"></div>

        <div class="bg-white shadow rounded-lg overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-100">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Enunciado</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Alternativas</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Resposta correta</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${perguntas}">
                        <td class="px-6 py-4 text-sm text-gray-500" th:text="${p.id}">1</td>
                        <td class="px-6 py-4 text-sm text-gray-800" th:text="${p.enunciado}">Enunciado</td>
                        <td class="px-6 py-4 text-sm text-gray-500">
                            <ul class="list-disc pl-5">
                                <li th:each="alt : ${p.alternativas}" th:text="${alt}"></li>
                            </ul>
                        </td>
                        <td class="px-6 py-4 text-sm font-semibold text-green-700" th:text="${p.alternativas != null ? p.alternativas[p.resposta] : ''}"></td>
                        <td class="px-6 py-4">
                            <a th:href="@{/admin/perguntas/excluir/{id}(id=${p.id})}" onclick="return confirm('Excluir pergunta?')" class="text-red-600 hover:text-red-900">Excluir</a>
                        </td>
                    </tr>
                    <tr th:if="${perguntas.empty}">
                        <td colspan="5" class="px-6 py-8 text-center text-gray-400">Nenhuma pergunta cadastrada para esta corrida.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
