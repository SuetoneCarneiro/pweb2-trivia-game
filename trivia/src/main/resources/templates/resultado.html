        <div class="bg-indigo-50 rounded-2xl py-6 px-4 mb-6">
          <p
            class="text-sm text-indigo-600 font-semibold uppercase tracking-wider mb-1"
          >
            Sua Pontuação
          </p>
          <p
            class="text-5xl font-extrabold text-indigo-700"
            th:text="${pontuacao != null ? #numbers.formatInteger(pontuacao, 1) : '0'}"
          >
            0
          </p>
          <p class="text-sm text-indigo-400 mt-1">pontos</p>
        </div>

        <div
          th:if="${mensagem}"
          class="mb-6 p-3 bg-blue-50 border border-blue-200 rounded-xl text-blue-700 text-sm"
          th:text="${mensagem}"
        ></div>

        <div class="space-y-3">
          <a
            th:href="@{/lobby}"
            class="block w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl shadow-md hover:shadow-lg transition-all duration-200 cursor-pointer"
          >
            Voltar ao Lobby
          </a>
          <a
            th:href="@{/ranking}"
            class="block w-full py-3 bg-white border-2 border-indigo-200 hover:border-indigo-400 text-indigo-600 font-semibold rounded-xl transition-all duration-200 cursor-pointer"
          >
            Ver Ranking
          </a>
          <a
            th:href="@{/logout}"
            class="block text-sm text-gray-400 hover:text-red-500 transition mt-2"
          >
            Sair
          </a>
        </div>
      </div>
