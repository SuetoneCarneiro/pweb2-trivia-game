<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Trivia Game - Login</title>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-500 via-purple-500 to-blue-600 flex items-center justify-center p-4">

    <div class="w-full max-w-md">
        <div class="bg-white/95 backdrop-blur-sm rounded-2xl shadow-2xl p-8">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-extrabold text-indigo-700 tracking-tight">Trivia Game</h1>
                <p class="mt-2 text-gray-500">Teste seus conhecimentos!</p>
            </div>

            <form method="post" th:action="@{/login}" class="space-y-6">
                <div>
                    <label for="nome" class="block text-sm font-semibold text-gray-700 mb-2">Seu nome</label>
                    <input type="text" id="nome" name="nome" required autofocus
                           placeholder="Digite seu nome..."
                           class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition text-gray-800 placeholder-gray-400" />
                </div>
                <button type="submit"
                        class="w-full py-3 px-6 bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white font-semibold rounded-xl shadow-lg hover:shadow-xl transition-all duration-200 cursor-pointer">
                    Entrar
                </button>
            </form>

            <div th:if="${mensagem}"
                 class="mt-6 p-3 bg-red-50 border border-red-200 rounded-xl text-red-700 text-sm text-center"
                 th:text="${mensagem}"></div>
        </div>
    </div>

</body>
</html>
